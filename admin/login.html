<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>دخول المشرف - شغف</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Reset وتحسينات للموبايل */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .admin-login {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .admin-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 30px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .admin-card h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 25px;
            font-size: 2rem;
            font-weight: 700;
            position: relative;
            padding-bottom: 15px;
        }
        
        .admin-card h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, #ff6b6b, #4ecdc4);
            border-radius: 2px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3436;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .input-group label i {
            color: #ff6b6b;
            margin-left: 5px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #868e96;
            font-size: 1.1rem;
        }
        
        .admin-card input {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border: 2px solid #f1f3f5;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
            -webkit-appearance: none;
        }
        
        .admin-card input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }
        
        .admin-card input::placeholder {
            color: #adb5bd;
            font-size: 0.9rem;
        }
        
        .admin-card button {
            width: 100%;
            padding: 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .admin-card button:active {
            transform: scale(0.98);
        }
        
        .admin-card button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .admin-card button.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        
        .admin-card button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 0.95rem;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .alert-error {
            background: #ffe3e3;
            color: #ff6b6b;
            border-right: 4px solid #ff6b6b;
        }
        
        .alert-success {
            background: #d3f9d8;
            color: #51cf66;
            border-right: 4px solid #51cf66;
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #868e96;
            font-size: 0.9rem;
            padding: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }
        
        .info-text i {
            color: #ff6b6b;
            margin-left: 5px;
        }
        
        /* تحسينات للموبايل الصغير */
        @media (max-width: 380px) {
            .admin-card {
                padding: 25px 20px;
            }
            
            .admin-card h1 {
                font-size: 1.8rem;
            }
            
            .admin-card input {
                padding: 12px 15px 12px 40px;
                font-size: 0.95rem;
            }
            
            .admin-card button {
                padding: 12px;
                font-size: 1rem;
            }
        }
        
        /* تحسين للمس في الموبايل */
        @media (hover: none) {
            .admin-card button:hover {
                background: #ff6b6b;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login">
        <div class="admin-card">
            <h1>دخول المشرف</h1>
            
            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>
            
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" dir="ltr" value="ahmedrashadali9@gmail.com">
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" dir="ltr">
                </div>
            </div>
            
            <button class="btn btn-primary" id="loginBtn">دخول</button>
            
            <div class="info-text">
                <i class="fas fa-shield-alt"></i>
                فقط للمشرفين المصرح لهم
            </div>
        </div>
    </div>

    <script type="module">
        // استيراد Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAWQxciHVfYRGaFTgEOnDjQtNb7G-qvaQo",
            authDomain: "shaghaf-story.firebaseapp.com",
            projectId: "shaghaf-story",
            storageBucket: "shaghaf-story.firebasestorage.app",
            messagingSenderId: "197591948575",
            appId: "1:197591948575:web:a0aaee7b7971f100c4e42a",
            measurementId: "G-2NRG7ETZFF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // قائمة البريد المسموح لها
        const allowedAdmins = [
            'omar@shaghaf.com',
            'ahmedrashadali9@gmail.com'
        ];

        window.adminLogin = async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            const loginBtn = document.getElementById('loginBtn');
            
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            if (!email || !password) {
                errorAlert.textContent = 'من فضلك أدخل البريد الإلكتروني وكلمة المرور';
                errorAlert.style.display = 'block';
                return;
            }
            
            loginBtn.textContent = 'جاري تسجيل الدخول...';
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                if (allowedAdmins.includes(email)) {
                    successAlert.textContent = 'تم التحقق، جاري التحويل...';
                    successAlert.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    errorAlert.textContent = 'هذا البريد ليس لديه صلاحية الدخول للوحة التحكم';
                    errorAlert.style.display = 'block';
                    await auth.signOut();
                    
                    loginBtn.textContent = 'دخول';
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
                
            } catch (error) {
                console.error(error);
                
                let errorMessage = 'فشل تسجيل الدخول';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'لا يوجد مستخدم بهذا البريد الإلكتروني';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'كلمة المرور غير صحيحة';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'البريد الإلكتروني غير صالح';
                } else if (error.code === 'auth/invalid-credential') {
                    errorMessage = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
                }
                
                errorAlert.textContent = errorMessage;
                errorAlert.style.display = 'block';
                
                loginBtn.textContent = 'دخول';
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        };

        document.getElementById('loginBtn').addEventListener('click', adminLogin);
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                adminLogin();
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user && allowedAdmins.includes(user.email)) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
